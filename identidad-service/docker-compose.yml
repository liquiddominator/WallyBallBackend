services:
  identidad-api:
    build:
      context: .
      dockerfile: identidad-service/Dockerfile
    container_name: identidad-api
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SqlServer: Server=identidad-sqlserver,1433;Database=IdentidadDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False
      Jwt__Issuer: IdentidadService
      Jwt__Audience: WallyBallClients
      Jwt__SigningKey: development-signing-key-change-before-production-32
      Jwt__ExpirationMinutes: 120
      Jwt__RefreshTokenExpirationDays: 7
      Jwt__MaxFailedLoginAttempts: 5
      Jwt__LockoutMinutes: 15
    ports:
      - "5097:8080"
    depends_on:
      - identidad-sqlserver
    networks:
      - identidad-network

  identidad-sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: identidad-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Your_password123
      MSSQL_PID: Developer
    ports:
      - "1434:1433"
    volumes:
      - identidad-sqlserver-data:/var/opt/mssql
    networks:
      - identidad-network

networks:
  identidad-network:
    driver: bridge

volumes:
  identidad-sqlserver-data:
