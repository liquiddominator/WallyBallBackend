services:
  api:
    build:
      context: .
      dockerfile: wally-service/Dockerfile
    container_name: wallyball-api
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SqlServer: Server=sqlserver,1433;Database=WallyBallDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True;Encrypt=False
      Jwt__Issuer: PersonasService
      Jwt__Audience: WallyBallClients
      Jwt__SigningKey: development-signing-key-change-before-production-32
      Jwt__ExpirationMinutes: 120
      Jwt__RefreshTokenExpirationDays: 7
      Jwt__MaxFailedLoginAttempts: 5
      Jwt__LockoutMinutes: 15
      PersonasService__BaseUrl: http://host.docker.internal:5097
    ports:
      - "5167:8080"
    depends_on:
      - sqlserver
    networks:
      - wallyball-network

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: wallyball-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: Your_password123
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - wallyball-network

networks:
  wallyball-network:
    driver: bridge

volumes:
  sqlserver-data:
